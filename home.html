<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تنقيطي Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a365d;
            --gold: #b7791f;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        #appContainer { width: 100%; max-width: 420px; padding: 20px; display: none; }

        /* الهيدر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { font-family: 'Amiri', serif; font-size: 1.8rem; margin: 0; color: var(--primary); }
        .bell-btn { background: white; border: none; padding: 10px; border-radius: 12px; position: relative; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: red; border-radius: 50%; border: 2px solid white; }

        /* الكرت الرئيسي */
        .main-card {
            background: linear-gradient(135deg, var(--primary) 0%, #2d4a77 100%);
            color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px;
            text-align: center; box-shadow: 0 10px 20px rgba(26, 54, 93, 0.2);
        }
        .main-card h2 { font-size: 2.5rem; margin: 10px 0; }
        .main-card p { font-size: 0.9rem; opacity: 0.8; margin: 0; }

        /* الشبكة المعدلة (3 أزرار فقط) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        
        /* جعل الزر الأول (سجل التلاميذ) يأخذ عرض السطر بالكامل لجمالية التصميم */
        .menu-item.full { grid-column: span 2; }

        .menu-item {
            background: white; padding: 25px 10px; border-radius: 18px;
            text-align: center; text-decoration: none; color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9;
            transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.97); background: #f1f5f9; }
        .menu-item i { font-size: 2rem; color: var(--gold); margin-bottom: 12px; display: block; }
        .menu-item span { font-weight: bold; font-size: 1rem; }

        /* درج الإشعارات الجانبي */
        #notifDrawer {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100%;
            background: white; z-index: 10000; transition: 0.4s; padding: 30px; box-sizing: border-box;
        }
        #notifDrawer.open { left: 0; }

        /* نافذة الدخول */
        #nameModal { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 85%; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="notifDrawer">
        <div onclick="toggleNotif()" style="cursor:pointer; margin-bottom:20px;"><i class="fas fa-arrow-right"></i> عودة</div>
        <h3>التنبيهات</h3>
        <hr>
        <p style="color:#666">لا توجد تنبيهات جديدة حالياً.</p>
    </div>

    <div id="nameModal" style="display:none">
        <div class="modal-box">
            <h2 style="font-family:'Amiri'">أهلاً بك يا أستاذ</h2>
            <input type="text" id="nameInput" placeholder="اكتب اسمك هنا...">
            <button onclick="saveName()">دخول</button>
        </div>
    </div>

    <div id="appContainer">
        <div class="header">
            <h1 id="userTitle">أهلاً بك</h1>
            <button class="bell-btn" onclick="toggleNotif()">
                <i class="fas fa-bell"></i>
                <div class="dot"></div>
            </button>
        </div>

        <div class="main-card">
            <p>إجمالي التلاميذ المسجلين</p>
            <h2 id="countDisp">0</h2>
            <div id="dateDisp" style="font-size: 0.8rem; opacity:0.7"></div>
        </div>

        <div class="menu-grid">
            <a href="students.html" class="menu-item full">
                <i class="fas fa-user-graduate"></i>
                <span>سجل التلاميذ</span>
            </a>
            <a href="marks.html" class="menu-item">
                <i class="fas fa-file-signature"></i>
                <span>رصد النقاط</span>
            </a>
            <a href="reports.html" class="menu-item">
                <i class="fas fa-print"></i>
                <span>التقارير</span>
            </a>
        </div>
    </div>

    <script>
        function toggleNotif() {
            document.getElementById('notifDrawer').classList.toggle('open');
            document.querySelector('.dot').style.display = 'none';
        }

        let db;
        const req = indexedDB.open("TanqitiDB", 1);
        req.onupgradeneeded = (e) => {
            e.target.result.createObjectStore("students", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            updateCount();
        };

        function updateCount() {
            if(!db) return;
            const store = db.transaction("students").objectStore("students");
            const countReq = store.count();
            countReq.onsuccess = () => document.getElementById('countDisp').innerText = countReq.result;
        }

        window.onload = function() {
            const name = localStorage.getItem("prof_name");
            if (!name) document.getElementById("nameModal").style.display = "flex";
            else launch(name);
            
            document.getElementById("dateDisp").innerText = new Date().toLocaleDateString('ar-DZ', { weekday: 'long', day: 'numeric', month: 'long' });
        };

        function saveName() {
            const n = document.getElementById("nameInput").value.trim();
            if(n) { localStorage.setItem("prof_name", n); launch(n); }
        }

        function launch(name) {
            document.getElementById("nameModal").style.display = "none";
            document.getElementById("appContainer").style.display = "block";
            document.getElementById("userTitle").innerText = "الأستاذ " + name;
        }
    </script>
</body>
</html>
